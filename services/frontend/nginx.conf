server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic security headers (safe defaults for static content)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Logs
  access_log /var/log/nginx/frontend.access.log;
  error_log  /var/log/nginx/frontend.error.log warn;

  # Backend API (Docker/Compose service name: backend)
  location /api/ {
    proxy_pass ${BACKEND_URL};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Optional health check passthrough
  location = /healthz {
    proxy_pass ${BACKEND_URL}/healthz;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
