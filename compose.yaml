services:
  backend:
    image: mourphy/hamza-backend:1.0.1
    container_name: hamza-backend
    env_file:
      - .env
    environment:
      # Make sure the app binds to the expected port inside the container
      PORT: "3000"
      # Keep backend API-only in containers (frontend is served by nginx)
      SERVE_FRONTEND: "false"
    ports:
      - "3000:3000"

  frontend:
    image: mourphy/hamza-frontend:v1.0.2
    container_name: hamza-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
